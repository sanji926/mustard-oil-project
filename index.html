<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy N Natural - Premium Mustard Oil</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fdfaf4; margin: 0; padding: 0; }
        header { background: #5d6d31; color: white; text-align: center; padding: 2rem; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Product Section */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; border-radius: 8px; }
        .price { font-size: 24px; color: #b45f06; font-weight: bold; }

        /* Order Form */
        .order-form { background: #fff; padding: 30px; border-radius: 10px; border-top: 5px solid #5d6d31; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #5d6d31; color: white; border: none; padding: 15px 30px; width: 100%; cursor: pointer; font-size: 18px; border-radius: 5px; }
        button:hover { background: #4a5726; }
    </style>
</head>
<body>

<header>
    <h1>Healthy N Natural</h1>
    <p>Cold Pressed Premium Mustard Oil - Since 2026</p>
</header>

<div class="container">
    <div class="product-grid">
        <div class="product-card">
            <img src="67118.png" alt="5 Litre Mustard Oil">
            <h3>Premium Mustard Oil (5 Litre)</h3>
            <p class="price">৳ ১৮০.০০ (উদাহরণ)</p>
        </div>
        <div class="product-card">
            <img src="67104.png" alt="500ml Mustard Oil">
            <h3>Premium Mustard Oil (500 ml)</h3>
            <p class="price">৳ ৯০.০০ (উদাহরণ)</p>
        </div>
    </div>

    <div class="order-form">
        <h2 style="text-align: center;">অর্ডার করতে নিচের ফর্মটি পূরণ করুন</h2>
        <form action="YOUR_BACKEND_URL" method="POST">
            <input type="text" name="name" placeholder="আপনার নাম লিখুন" required>
            <input type="tel" name="phone" placeholder="মোবাইল নম্বর" required>
            <select name="product">
                <option value="5_litre">৫ লিটার বোতল</option>
                <option value="500_ml">৫০০ মিলি বোতল</option>
            </select>
            <textarea name="address" rows="4" placeholder="আপনার সম্পূর্ণ ঠিকানা (গ্রাম, পোস্ট, জেলা, পিন কোড)" required></textarea>
            <button type="submit">অর্ডার কনফার্ম করুন</button>
        </form>
    </div>
</div>

</body>
</html>
